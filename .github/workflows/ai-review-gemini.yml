name: Gemini Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  gemini-review:
    runs-on: ubuntu-latest
    steps:
      - name: Gemini Code Review
        uses: nicolo-ribaudo/gemini-code-review@v0
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          model: "gemini-2.5-flash"
          preamble: |
            あなたは VB.NET WinForms アプリケーション（Access VBA からの移行プロジェクト）のコードレビュアーです。
            以下の観点でレビューしてください:

            1. VB.NET のコード品質・型安全性
            2. PostgreSQL (Npgsql) のデータアクセスパターン
            3. WinForms のリソース管理 (Dispose パターン)
            4. Access VBA からの移行における正確性
            5. セキュリティ (SQL インジェクション、接続文字列のハードコード)
            6. エラーハンドリング

            日本語でレビューコメントを書いてください。
            重要な問題のみコメントし、軽微なスタイルの指摘は避けてください。
